spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration #구글 api 끄기
  application:
    name: nova # 애플리케이션 이름 설정
  config:
    import: optional:classpath:config/secrets.yaml, optional:file:./config/secrets.yaml  #secrets.yaml 파일로 값 읽어오기
  mail: # 지메일 발송용
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    protocol: ${SPRING_MAIL_PROTOCOL}
    tls: ${SPRING_MAIL_TLS}
    properties:
      mail.smtp.auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
      mail.smtp.starttls.enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
  datasource:
    url: jdbc:mariadb://${DB_IP}:${DB_PORT}/${DB_TABLE}?serverTimezone=Asia/Seoul # DB 접속 URL (Timezone: Asia/Seoul)
    username: ${DB_USER} # DB 사용자 계정
    password: ${DB_PW} # DB 비밀번호
    hikari:
      maximum-pool-size: 15

  sql:
    init:
      mode: never # 애플리케이션 시작 시 SQL 스크립트 실행 모드 (always: 항상 실행, never: 실행 x)
  jpa:
    #open-in-view: false # DB 조회가 끝나는 즉시 커넥션을 반환하도록 강제
    defer-datasource-initialization: true
    show-sql: false # 실행되는 SQL 쿼리를 콘솔에 출력
    hibernate:
      ddl-auto: none   # DDL 자동 생성 전략 (none / create / validate / update)
    properties:
      hibernate:
        format_sql: true # 로그에 출력되는 SQL을 보기 좋게 포맷팅
  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379
  # Mqtt 설정
  mqtt:
    url: tcp://${MQTT_BROKER_IP}:${MQTT_PORT}
    client-id: ${CLIENT_ID}
    username: ${MQTT_USERNAME}
    password: ${MQTT_PASSWORD}
    topic:
      safety: hdc/device/+/safety/data
      env: hdc/+/room/+/env/data
      assistant: hdc/+/assistant/execute/res
      assistant-req: hdc/{hoId}/assistant/execute/req
      device-req: hdc/{hoId}/room/{roomId}/device/execute/req
      mode-req: hdc/{hoId}/room/{roomId}/mode/execute/req
      device-res: hdc/{hoId}/room/{roomId}/device/execute/res
      voice: hdc/+/assistant/voice/req
      entrance: hdc/entrance/verify

  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
        project-id: ${GOOGLE_PROJECT_ID}
        chat:
          options:
            model: openai/gpt-oss-safeguard-20b:nitro
    openai-sdk:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      custom-headers:
        HTTP-Referer: ${OPENROUTER_HTTP_REFERER:http://localhost}
        X-Title: ${OPENROUTER_X_TITLE:nova}
      chat:
        options:
          model: google/gemini-3-flash-preview
          temperature: 0.7

    openrouter:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      embedding-model: openai/text-embedding-3-small

  # 기본 예외 로그 해제
  mvc:
    log-resolved-exception: false

  #OAuth 설정
  security:
    oauth2:
      client:
        registration:
          naver:
            client-name: naver
            client-id: ${NAVER_ID}
            client-secret: ${NAVER_SECRET}
            redirect-uri: http://${YOUR_IP}:8080/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            scope: name,mobile,email,birthyear,birthday,profile_image
          google:
            client-name: google
            client-id: ${GOOGLE_ID}
            client-secret: ${GOOGLE_SECRET}
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            authorization-grant-type: authorization_code
            scope: profile,email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  #img 관련 파일 보내는 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
# Swagger (SpringDoc) 설정
springdoc:
  swagger-ui:
    enabled: true               # Swagger UI 사용 활성화
    path: /api        # Swagger UI 접속 경로 (기본 경로 외 커스텀 경로)
    tags-sorter: alpha          # API 태그(Controller) 정렬 순서 (alpha: 알파벳순)
    operations-sorter: alpha    # API 오퍼레이션(Method) 정렬 순서 (alpha: 알파벳순)
# jwt Token
jwt:
  secret: ${JWT_TOKEN}
# openweather api key
openweather:
  api-key: ${OPENWEATHER_API_KEY}
otp:
  secret: ${OTP_SECRET}

#ai 스피커
voice:
  stt:
    provider: huggingface
    huggingface:
      api-url: https://router.huggingface.co/hf-inference/models/openai/whisper-large-v3-turbo
      api-token: ${HUGGINGFACE_API_TOKEN}
      timeout-seconds: 90

# Monitoring System
management:
  server:
    port: 7080 # Actuator는 7080 포트에서만 열림
  endpoints:
    web:
      exposure:
        include: "*"

# 파일 업로드 설정
file:
  # 로컬 개발 경로
  dir: ${FILE_DIR:/app/images/}
  # 접근할 URL prefix
  prefix: /images/

server:
  forward-headers-strategy: native # Nginx가 전달하는 X-Forwarded-* 헤더를 인식하도록 추가