spring:
  main:
    lazy-initialization: true # Bean 지연 로딩
  config:
    import: optional:classpath:config/secrets.yaml #secrets.yaml 파일로 값 읽어오기
  datasource:
    url: jdbc:mariadb://${DB_IP}:${DB_PORT}/${DB_TABLE}?serverTimezone=Asia/Seoul # DB 접속 URL (Timezone: Asia/Seoul)
    username: ${DB_USER} # DB 사용자 계정
    password: ${DB_PW} # DB 비밀번호

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never
  mqtt:
    url: tcp://${MQTT_BROKER_IP}:${MQTT_PORT}
    client-id: ${CLIENT_ID}
    username: ${MQTT_USERNAME}
    password: ${MQTT_PASSWORD}
    topic:
      safety: hdc/device/+/safety/data
      env: hdc/device/+/env/data
      assistant: hdc/+/assistant/execute/res
  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
        project-id: ${GOOGLE_PROJECT_ID}
        chat:
          options:
            model: gemini-2.5-flash
  #img 관련 파일 보내는 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-id
            client-secret: test-google-secret
            redirect-uri: http://${YOUR_IP}:8080/login/oauth2/code/google
            authorization-grant-type: authorization_code
            scope: profile,email
          naver:
            client-id: test-naver-id
            client-secret: test-naver-secret
            redirect-uri: http://${YOUR_IP}:8080/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            scope: name,email,profile_image
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: ${JWT_TOKEN}

openweather:
  api-key: ${OPENWEATHER_API_KEY}

otp:
  secret: ${OTP_SECRET}
# 파일 업로드 설정
file:
  # 윈도우 로컬 개발 경로
  dir: C:/Users/Admin/Desktop/nova-images/
  # 접근할 URL prefix
  prefix: /images/
